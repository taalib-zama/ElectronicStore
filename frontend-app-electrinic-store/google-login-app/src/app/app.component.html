<div class="min-h-screen bg-gradient-to-br from-blue-900 via-purple-900 to-indigo-900 flex items-center justify-center p-4">
  @if(user) {
  <!-- User Dashboard -->
  <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
    <div class="mb-6">
      <img [src]="user.imagePath || user.imageName || 'https://via.placeholder.com/150'" class="w-24 h-24 rounded-full mx-auto border-4 border-purple-500 shadow-lg object-cover" alt="User" />
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Welcome Back!</h2>
    <p class="text-xl text-gray-700 mb-1">{{ user.name }}</p>
    <p class="text-gray-500 mb-6">{{ user.email }}</p>
    <button (click)="logout()" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-300">
      Sign Out
    </button>
  </div>
  } @else {
  <!-- Login/Signup Page -->
  <app-auth></app-auth>
  }
</div>
