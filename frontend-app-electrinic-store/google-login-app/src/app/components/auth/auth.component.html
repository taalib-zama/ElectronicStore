<div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
  <!-- Icon & Title -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-purple-500 to-blue-600 rounded-2xl mb-4 shadow-lg">
      <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path>
      </svg>
    </div>
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Electronic Store</h1>
    <p class="text-gray-600">{{ isLogin ? 'Sign in to your account' : 'Create a new account' }}</p>
  </div>

  <!-- Tabs -->
  <div class="flex mb-6 bg-gray-100 rounded-lg p-1">
    <button (click)="toggleMode()" [class.bg-white]="isLogin" [class.shadow]="isLogin" class="flex-1 py-2 rounded-md transition font-semibold" [class.text-purple-600]="isLogin" [class.text-gray-600]="!isLogin">
      Login
    </button>
    <button (click)="toggleMode()" [class.bg-white]="!isLogin" [class.shadow]="!isLogin" class="flex-1 py-2 rounded-md transition font-semibold" [class.text-purple-600]="!isLogin" [class.text-gray-600]="isLogin">
      Sign Up
    </button>
  </div>

  <!-- Error/Success Messages -->
  <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
    {{ errorMessage }}
  </div>
  <div *ngIf="successMessage" class="mb-4 p-3 bg-green-100 text-green-700 rounded-lg text-sm">
    {{ successMessage }}
  </div>

  <!-- Login Form -->
  <form *ngIf="isLogin" (ngSubmit)="onLogin()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" [(ngModel)]="loginData.email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent text-gray-900" placeholder="your@email.com" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" [(ngModel)]="loginData.password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent text-gray-900" placeholder="••••••••" />
    </div>
    <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-blue-600 text-white font-semibold py-3 rounded-lg hover:from-purple-600 hover:to-blue-700 transition">
      Sign In
    </button>
  </form>

  <!-- Signup Form -->
  <form *ngIf="!isLogin" (ngSubmit)="onSignup()" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" [(ngModel)]="signupData.name" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent text-gray-900" placeholder="John Doe" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" [(ngModel)]="signupData.email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent text-gray-900" placeholder="your@email.com" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" [(ngModel)]="signupData.password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent text-gray-900" placeholder="••••••••" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">About (Optional)</label>
      <textarea [(ngModel)]="signupData.about" name="about" rows="2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent text-gray-900" placeholder="Tell us about yourself"></textarea>
    </div>
    <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-blue-600 text-white font-semibold py-3 rounded-lg hover:from-purple-600 hover:to-blue-700 transition">
      Create Account
    </button>
  </form>

  <!-- Divider -->
  <div class="my-6">
    <div class="relative">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-4 bg-white text-gray-500">Or continue with</span>
      </div>
    </div>
  </div>

  <!-- Google Sign In Button -->
  <div class="flex justify-center">
    <asl-google-signin-button type="standard" size="large" text="signin_with"></asl-google-signin-button>
  </div>

  <!-- Footer -->
  <div class="mt-8 text-center text-sm text-gray-500">
    <p>By signing in, you agree to our Terms of Service and Privacy Policy</p>
  </div>
</div>
